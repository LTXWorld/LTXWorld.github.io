baseURL: "https://blog.bfsmlt.top/" # 主站的 URL
title: LTX's Blog # 站点标题
copyright: "[©2025 LTX's Blog](https://LTXWorld.github.io/)" # 网站的版权声明，通常显示在页脚
theme: PaperMod # 主题
languageCode: zh-cn # 语言 
enableInlineShortcodes: true # shortcode，类似于模板变量，可以在写 markdown 的时候便捷地插入，官方文档中有一个视频讲的很通俗
hasCJKLanguage: true # 是否有 CJK 的字符
enableRobotsTXT: true # 允许生成 robots.txt
buildDrafts: false # 构建时是否包括草稿
buildFuture: false # 构建未来发布的内容
buildExpired: false # 构建过期的内容
enableEmoji: true # 允许 emoji
pygmentsUseClasses: true
defaultContentLanguage: zh # 顶部首先展示的语言界面
defaultContentLanguageInSubdir: false # 是否要在地址栏加上默认的语言代码

languages:
  zh:
    languageName: "中文" # 展示的语言名
    weight: 1 # 权重
    taxonomies: # 分类系统
      category: categories
      tag: tags

    # https://gohugo.io/content-management/menus/#define-in-site-configuration=
    menus:
      main:
        - name: 首页
          pageRef: /
          weight: 4 # 控制在页面上展示的前后顺序
        - name: 归档
          pageRef: archives/
          weight: 5
        - name: 分类
          pageRef: categories/

          weight: 10

        - name: 标签

          pageRef: tags/

          weight: 10

        - name: 搜索

          pageRef: search/

          weight: 20

        - name: 关于

          pageRef: about/

          weight: 21

paginate.pagerSize: 8

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "Theme PaperMod - https://github.com/adityatelange/hugo-PaperMod"
  author: LTX
  mainSections:
    - posts
  # author: ["Me", "You"] # multiple authors

  defaultTheme: dark
  # disableThemeToggle: true
  ShowShareButtons: false
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  comments: true
  images: ["images/papermod-cover.png"]

    # 首页的文章上方的一些信息
  homeInfoParams:
    # 首页的 profile 内容
    Title: "Hey Guys 👋"
    # 首页的 profile 内容
    Content: >
      Welcome to my Blog! 你好！我是LTX,一个从材料跨考到计算机的菜鸟跨考人，在这里分享自己平时的知识总结与个人小记。
      同时，Shout out to sonnycalcr,没有他的帮助我无法完成这个项目。
      <br>
      
      <br>
      <div>
      
      <br>
      
      <br>
      
      </div>
  # 社交帐号的按钮
  socialIcons:
    - name: github
      title: 总有一天我会在Github上面创建好的开源项目分享给大家
      url: "https://github.com/LTXWorld"
    - name: X
      title: Follow my Twitter
      url: "https://x.com/happyLTXlife"
    - name: Bilibili
      title: 如果对我感兴趣的话，可以来B站看看我的日常生活哦
      url: "https://space.bilibili.com/16194735"
    - name: Youtube
      title: Follow my Youtube Channel
      url: "https://www.youtube.com/@jimmyluvideo6725"
    - name: Telegram
      title: Contact Me
      url: "https://web.telegram.org/k/"
    # 搜索

  fuseOpts:

      isCaseSensitive: false # 是否大小写敏感

      shouldSort: true # 是否排序

      location: 0

      distance: 1000

      threshold: 0.4

      minMatchCharLength: 0

      # limit: 10 # refer: https://www.fusejs.io/api/methods.html#search

      keys: ["title", "permalink", "summary", "content"]

      includeMatches: true

  # 设置网站的标签页的图标，即 favicon
  assets:
      favicon: "favicon.png"

      favicon16x16: "favicon.png"

      favicon32x32: "favicon.png"

      apple_touch_icon: "favicon.png"

      safari_pinned_tab: "favicon.png"
  
  musicPlayer:
    enabled: true
    autoplay: true
    loopPlaylist: true
    startVolume: 0.6
    defaultCover: "" # 可选：未提供封面时使用的图片，例如 /img/disc-default.png
    # 将音乐文件放在 static/audio/ 目录下
    tracks:
      - title: "依然爱你"
        artist: "王力宏"
        file: "/audio/02 - 依然爱你.mp3"
      - title: "改变自己"
        artist: "王力宏"
        file: "/audio/05 - 改变自己.mp3"
      - title: "爱错"
        artist: "王力宏"
        file: "/audio/11 - 爱错.mp3"
      - title: "Last Night"
        artist: "Morgan Wallen"
        file: "/audio/Last Night - Morgan Wallen.mp3"

  giscus:
    repo: "LTXWorld/LTXWorld.github.io"

    repoId: "R_kgDONODUuA"

    category: "Announcements"

    categoryId: "DIC_kwDONODUuM4CkMUw"

    mapping: "pathname"

    strict: "0"

    reactionsEnabled: "1"

    emitMetadata: "0"

    inputPosition: "bottom"

    lightTheme: "light"

    darkTheme: "dark"

    lang: "zh-CN"

    crossorigin: "anonymous"


outputs:
  home:
    - HTML # 生成的静态页面
    - RSS # 这个其实无所谓
    - JSON # necessary for search, 这里的配置修改好之后，一定要重新生成一下
